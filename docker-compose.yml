version: "3.9"
services:
  redis:
    image: redis:alpine
    expose:
      - "6379"
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - "8080:5000"
    depends_on:
      - redis
      - worker
      
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    depends_on:
      - redis
    volumes:
      - ./logs/worker:/home/appuser/code/logs
